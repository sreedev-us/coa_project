name: Generate Architecture Report

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build-and-report:
    runs-on: ubuntu-22.04 # perfectly matches your WSL environment

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install gem5 Hardware Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libunwind-dev \
            libgoogle-perftools-dev \
            libprotobuf-dev \
            libboost-all-dev \
            python3-dev \
            libpng-dev \
            zlib1g-dev \
            m4 \
            libhdf5-dev

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Script Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-pptx matplotlib

      - name: Grant Execute Permissions
        # Ensure gem5 and the C benchmarks are allowed to run
        run: |
          chmod +x build/X86/gem5.opt
          chmod +x s4_project_tests/branch_test_random
          chmod +x s4_project_tests/branch_test_pattern

      - name: Debug Library Dependencies
        run: ldd build/X86/gem5.opt

      - name: Run Master Pipeline
        run: python3 generate_presentation.py

      - name: Upload PPTX Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KTU_S4_Project_Report
          path: s4_project_tests/KTU_S4_Project_Report.pptx
